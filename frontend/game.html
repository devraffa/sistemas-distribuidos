<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoryArrows — Partida</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <style>
        body {
            overflow-y: auto;
        }

        .game-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            min-height: 100vh;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
            align-items: start;
        }

        @media (max-width: 768px) {
            .game-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                order: -1;
            }
        }

        /* ── Header ─────────────────────────────────────────────── */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .room-code {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .room-code strong {
            font-size: 1.1rem;
            color: var(--accent);
            letter-spacing: 0.1em;
        }

        .round-badge {
            background: linear-gradient(135deg, var(--accent), #9b6cff);
            padding: 6px 18px;
            border-radius: 999px;
            font-weight: 700;
        }

        /* ── Main area ───────────────────────────────────────────── */
        .main-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .phase {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .phase.active {
            display: flex;
        }

        /* ── Lobby ───────────────────────────────────────────────── */
        .lobby-card {
            padding: 40px;
            text-align: center;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }

        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-16px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ── Turn banner (who is playing this round) ─────────────── */
        #turn-banner {
            padding: 14px 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 1.05rem;
            border: 1px solid var(--accent);
            background: rgba(108, 99, 255, 0.1);
            display: none;
        }

        #turn-banner.visible {
            display: block;
        }

        #turn-banner.my-turn {
            border-color: var(--up);
            background: rgba(74, 222, 128, 0.1);
            color: var(--up);
        }

        #turn-banner.other-turn {
            border-color: var(--muted);
            background: transparent;
            color: var(--muted);
        }

        /* ── Arrow / Sequence area ───────────────────────────────── */
        .arrow-display {
            font-size: clamp(5rem, 18vw, 9rem);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            border-radius: 20px;
            border: 2px solid var(--border);
            background: var(--surface);
            transition: all 0.2s;
            user-select: none;
        }

        .arrow-display.arrow-UP {
            border-color: var(--up);
            box-shadow: 0 0 40px rgba(74, 222, 128, 0.3);
        }

        .arrow-display.arrow-DOWN {
            border-color: var(--down);
            box-shadow: 0 0 40px rgba(248, 113, 113, 0.3);
        }

        .arrow-display.arrow-LEFT {
            border-color: var(--left);
            box-shadow: 0 0 40px rgba(96, 165, 250, 0.3);
        }

        .arrow-display.arrow-RIGHT {
            border-color: var(--right);
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.3);
        }

        .arrow-display.animate-in {
            animation: arrowPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes arrowPop {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── Sequence chips row ──────────────────────────────────── */
        #sequence-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 12px 16px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            min-height: 58px;
            align-items: center;
        }

        .arrow-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            font-size: 1.2rem;
            border: 1px solid var(--border);
            background: var(--surface2);
            transition: all 0.15s;
        }

        .arrow-chip.UP {
            border-color: var(--up);
            color: var(--up);
        }

        .arrow-chip.DOWN {
            border-color: var(--down);
            color: var(--down);
        }

        .arrow-chip.LEFT {
            border-color: var(--left);
            color: var(--left);
        }

        .arrow-chip.RIGHT {
            border-color: var(--right);
            color: var(--right);
        }

        .arrow-chip.current {
            box-shadow: 0 0 12px currentColor;
            transform: scale(1.15);
        }

        .arrow-chip.correct {
            background: rgba(74, 222, 128, 0.2);
        }

        .arrow-chip.wrong {
            background: rgba(248, 113, 113, 0.2);
        }

        /* ── Input buttons ───────────────────────────────────────── */
        #input-section {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            display: none;
        }

        #input-section.visible {
            display: flex;
        }

        .input-arrows {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-arrow {
            width: 76px;
            height: 76px;
            border-radius: 14px;
            font-size: 2.2rem;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        .btn-arrow:hover:not(:disabled) {
            transform: scale(1.08);
        }

        .btn-arrow.up:hover:not(:disabled) {
            border-color: var(--up);
            background: rgba(74, 222, 128, 0.15);
        }

        .btn-arrow.down:hover:not(:disabled) {
            border-color: var(--down);
            background: rgba(248, 113, 113, 0.15);
        }

        .btn-arrow.left:hover:not(:disabled) {
            border-color: var(--left);
            background: rgba(96, 165, 250, 0.15);
        }

        .btn-arrow.right:hover:not(:disabled) {
            border-color: var(--right);
            background: rgba(251, 191, 36, 0.15);
        }

        .btn-arrow:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* Timer bar */
        .timer-wrap {
            height: 6px;
            background: var(--surface2);
            border-radius: 999px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.1s linear;
        }

        /* ── Progress indicator ──────────────────────────────────── */
        #progress-msg {
            text-align: center;
            font-size: 0.95rem;
            color: var(--muted);
        }

        /* ── Sidebar ─────────────────────────────────────────────── */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .sidebar-card {
            padding: 18px;
        }

        .sidebar-card h3 {
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .p-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.88rem;
        }

        .p-row:last-child {
            border-bottom: none;
        }

        .p-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .p-row.current-turn .p-name {
            color: var(--up);
        }

        /* ── Result overlay ──────────────────────────────────────── */
        #result-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        #result-overlay.show {
            display: flex;
        }

        .result-card {
            padding: 48px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from {
                transform: scale(0.7);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .result-emoji {
            font-size: 4.5rem;
            margin-bottom: 16px;
        }

        .score-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .score-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-radius: 10px;
            background: var(--surface2);
        }
    </style>
</head>

<body>

    <div class="container" style="padding-top:20px;">
        <!-- Header -->
        <div class="glass game-header">
            <div class="room-code">Sala: <strong id="hdr-room-id">—</strong></div>
            <div class="round-badge">Rodada <span id="hdr-round">—</span></div>
            <div style="font-size:0.85rem;color:var(--muted)"><span id="hdr-player">—</span></div>
        </div>

        <div class="game-layout">
            <!-- ── MAIN ─────────────────────────────────────────────── -->
            <div class="main-area">

                <!-- LOBBY -->
                <div class="phase active" id="phase-lobby">
                    <div class="glass lobby-card">
                        <h2>🎮 Aguardando jogadores...</h2>
                        <div style="margin:24px 0;">
                            <div style="font-size:3rem;font-weight:900;letter-spacing:0.15em;color:var(--accent);"
                                id="lobby-room-code">—</div>
                            <p>Código da Sala</p>
                        </div>
                        <div class="player-list" id="lobby-player-list"></div>
                        <div style="margin-top:24px;">
                            <button class="btn btn-primary" id="btn-start" disabled style="min-width:200px;">Iniciar
                                Partida</button>
                            <p style="margin-top:8px;font-size:0.8rem;color:var(--muted);" id="start-hint">Mínimo 2
                                jogadores</p>
                        </div>
                    </div>
                </div>

                <!-- GAME PHASE -->
                <div class="phase" id="phase-game">

                    <!-- Turn banner -->
                    <div id="turn-banner"></div>

                    <!-- Sequence chips (full sequence sempre visível) -->
                    <div class="glass" style="padding:16px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                            <h3 style="font-size:0.95rem;">Sequência desta rodada</h3>
                            <span id="seq-label" class="badge badge-active"></span>
                        </div>
                        <div id="sequence-row"></div>
                    </div>

                    <!-- Big arrow (shown during sequence display) -->
                    <div class="arrow-display" id="big-arrow" style="display:none;"></div>

                    <!-- Progress message -->
                    <p id="progress-msg"></p>

                    <!-- Input section (only visible when it's your turn) -->
                    <div class="glass" id="input-section">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                            <h3>🕹️ Sua vez! Repita a sequência</h3>
                            <span id="move-progress" class="badge badge-active">0/0</span>
                        </div>
                        <div class="timer-wrap">
                            <div class="timer-bar" id="timer-bar" style="width:100%"></div>
                        </div>
                        <div class="input-arrows" style="margin-top:18px;">
                            <button class="btn-arrow up" data-dir="UP">↑</button>
                            <button class="btn-arrow down" data-dir="DOWN">↓</button>
                            <button class="btn-arrow left" data-dir="LEFT">←</button>
                            <button class="btn-arrow right" data-dir="RIGHT">→</button>
                        </div>
                        <p id="turn-status"
                            style="text-align:center;margin-top:10px;font-size:0.9rem;color:var(--muted);"></p>
                    </div>
                </div>

            </div><!-- /main-area -->

            <!-- ── SIDEBAR ──────────────────────────────────────────── -->
            <div class="sidebar">
                <div class="glass sidebar-card">
                    <h3>👥 Jogadores</h3>
                    <div id="sidebar-players"></div>
                </div>
                <div class="glass sidebar-card" style="font-size:0.8rem;">
                    <h3>⚙️ SD Status</h3>
                    <div style="display:flex;flex-direction:column;gap:6px;color:var(--muted);">
                        <div>🕐 Lamport: <strong id="sd-lamport" style="color:var(--text)">0</strong></div>
                        <div>🔌 CB DB: <strong id="sd-cb" style="color:var(--up)">CLOSED</strong></div>
                    </div>
                </div>
                <div class="glass sidebar-card">
                    <h3>📜 Log</h3>
                    <div id="game-log"
                        style="max-height:180px;overflow-y:auto;font-size:0.78rem;color:var(--muted);display:flex;flex-direction:column;gap:3px;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Result overlay -->
    <div id="result-overlay">
        <div class="glass result-card">
            <div class="result-emoji" id="result-emoji">🏆</div>
            <h2 id="result-title">Fim de Jogo!</h2>
            <p id="result-subtitle"></p>
            <div class="score-list" id="result-scores"></div>
            <div style="margin-top:28px;display:flex;gap:12px;justify-content:center;">
                <a href="/" class="btn btn-secondary">← Lobby</a>
                <a href="/scoreboard" class="btn btn-primary">Placar →</a>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { GameWSClient } from '/static/js/ws_client.js';

        // ── State ────────────────────────────────────────────────────
        const roomId = sessionStorage.getItem('room_id');
        const playerId = sessionStorage.getItem('player_id');
        const playerName = sessionStorage.getItem('player_name');
        const isHost = sessionStorage.getItem('is_host') === 'true';
        if (!roomId || !playerId) { window.location.href = '/'; }

        const WS_HOST = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
        const client = new GameWSClient(WS_HOST);

        const ARROW_MAP = { UP: '↑', DOWN: '↓', LEFT: '←', RIGHT: '→' };

        // Game state
        let myTurn = false;
        let moveIndex = 0;
        let seqLength = 0;
        let fullSequence = [];   // sequência cumulativa acumulada a partir dos chips
        let timerInterval = null;

        // ── UI refs ──────────────────────────────────────────────────
        const $round = document.getElementById('hdr-round');
        const $roomCode = document.getElementById('hdr-room-id');
        const $hdrPlayer = document.getElementById('hdr-player');
        const $lobbyCode = document.getElementById('lobby-room-code');
        const $btnStart = document.getElementById('btn-start');
        const $startHint = document.getElementById('start-hint');
        const $lobbyList = document.getElementById('lobby-player-list');
        const $phaseLobby = document.getElementById('phase-lobby');
        const $phaseGame = document.getElementById('phase-game');
        const $turnBanner = document.getElementById('turn-banner');
        const $seqRow = document.getElementById('sequence-row');
        const $seqLabel = document.getElementById('seq-label');
        const $bigArrow = document.getElementById('big-arrow');
        const $progressMsg = document.getElementById('progress-msg');
        const $inputSec = document.getElementById('input-section');
        const $moveProg = document.getElementById('move-progress');
        const $timerBar = document.getElementById('timer-bar');
        const $turnStatus = document.getElementById('turn-status');
        const $sdLamport = document.getElementById('sd-lamport');
        const $sdCb = document.getElementById('sd-cb');
        const $sidebarPl = document.getElementById('sidebar-players');
        const $log = document.getElementById('game-log');

        // ── Init ─────────────────────────────────────────────────────
        $roomCode.textContent = roomId;
        $lobbyCode.textContent = roomId;
        $hdrPlayer.textContent = playerName;
        if (!isHost) $btnStart.style.display = 'none';

        // ── Helpers ──────────────────────────────────────────────────
        function toast(msg, type = 'info', ms = 2500) {
            const el = document.getElementById('toast');
            el.textContent = msg; el.className = `show ${type}`;
            setTimeout(() => el.className = '', ms);
        }

        function addLog(msg) {
            const row = document.createElement('div');
            row.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            $log.prepend(row);
            if ($log.children.length > 40) $log.lastChild.remove();
        }

        function showPhase(game) {
            $phaseLobby.classList.toggle('active', !game);
            $phaseGame.classList.toggle('active', game);
        }

        function renderLobby(players) {
            $lobbyList.innerHTML = Object.values(players).map(p => `
      <div class="player-row">
        <span style="font-weight:600;">${p.name}</span>
        <span>${p.device_type === 'bitdoglab' ? '🤖' : '🖥️'} ${p.is_host ? '<span class="badge badge-winner">Host</span>' : ''}</span>
      </div>`).join('');
            const count = Object.keys(players).length;
            $btnStart.disabled = count < 2 || !isHost;
            $startHint.textContent = count < 2 ? 'Mínimo 2 jogadores' : `${count} pronto(s)`;
        }

        function renderSidebar(players, currentTurnId = null) {
            $sidebarPl.innerHTML = Object.values(players).map(p => `
      <div class="p-row ${p.id === currentTurnId ? 'current-turn' : ''}">
        <span class="p-name">
          ${p.id === currentTurnId ? '▶ ' : ''}
          ${p.device_type === 'bitdoglab' ? '🤖' : '🖥️'} ${p.name}
        </span>
        <span class="badge badge-${p.status}">${p.status === 'active' ? '✓' : p.status === 'eliminated' ? '✕' : '…'}</span>
      </div>`).join('');
        }

        // ── Sequence chips (stays on screen, highlights current) ─────
        function buildSequenceRow(sequence, highlightIndex = -1) {
            $seqRow.innerHTML = sequence.map((dir, i) => {
                let cls = `arrow-chip ${dir}`;
                if (i === highlightIndex) cls += ' current';
                return `<div class="${cls}">${ARROW_MAP[dir]}</div>`;
            }).join('');
            $seqLabel.textContent = `${sequence.length} seta(s)`;
        }

        function markChip(index, result) {
            const chips = $seqRow.querySelectorAll('.arrow-chip');
            if (chips[index]) {
                chips[index].classList.remove('current');
                chips[index].classList.add(result ? 'correct' : 'wrong');
            }
        }

        // ── Big arrow display ─────────────────────────────────────────
        function showBigArrow(dir) {
            $bigArrow.style.display = 'flex';
            $bigArrow.textContent = ARROW_MAP[dir] || '?';
            $bigArrow.className = `arrow-display arrow-${dir} animate-in`;
            setTimeout(() => $bigArrow.classList.remove('animate-in'), 300);
        }

        function clearBigArrow() {
            $bigArrow.style.display = 'none';
            $bigArrow.textContent = '';
            $bigArrow.className = 'arrow-display';
        }

        // ── Turn banner ───────────────────────────────────────────────
        function setTurnBanner(isMe, playerNameStr) {
            $turnBanner.classList.add('visible');
            if (isMe) {
                $turnBanner.textContent = '🎯 SUA VEZ — repita a sequência!';
                $turnBanner.className = 'visible my-turn';
            } else {
                $turnBanner.textContent = `👀 Vez de ${playerNameStr} — observe e memorize`;
                $turnBanner.className = 'visible other-turn';
            }
        }

        // ── Arrow buttons ─────────────────────────────────────────────
        function setArrowsEnabled(enabled) {
            document.querySelectorAll('.btn-arrow').forEach(b => b.disabled = !enabled);
        }
        setArrowsEnabled(false);

        document.querySelectorAll('.btn-arrow').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!myTurn) return;
                client.sendMove(btn.dataset.dir);
            });
        });

        // Also support keyboard arrows
        document.addEventListener('keydown', e => {
            if (!myTurn) return;
            const map = { ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT' };
            if (map[e.key]) { e.preventDefault(); client.sendMove(map[e.key]); }
        });

        // ── Timer ─────────────────────────────────────────────────────
        function startTimer(ms) {
            clearInterval(timerInterval);
            const start = Date.now();
            $timerBar.style.width = '100%';
            timerInterval = setInterval(() => {
                const pct = Math.max(0, 1 - (Date.now() - start) / ms);
                $timerBar.style.width = `${pct * 100}%`;
                $timerBar.style.background = pct < 0.3
                    ? 'linear-gradient(90deg,#ef4444,#dc2626)'
                    : 'linear-gradient(90deg,var(--accent),var(--accent2))';
                if (pct <= 0) clearInterval(timerInterval);
            }, 80);
        }
        function stopTimer() { clearInterval(timerInterval); }

        // ── SD status poller ──────────────────────────────────────────
        async function pollStatus() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                $sdLamport.textContent = d.lamport_clock;
                $sdCb.textContent = d.circuit_breaker_db.state;
                $sdCb.style.color = d.circuit_breaker_db.state === 'CLOSED' ? 'var(--up)'
                    : d.circuit_breaker_db.state === 'OPEN' ? 'var(--down)' : 'var(--right)';
            } catch { }
        }
        pollStatus(); setInterval(pollStatus, 4000);

        // ────────────────────────────────────────────────────────────
        // WebSocket event handlers
        // ────────────────────────────────────────────────────────────
        client
            .on('identified', () => {
                client.joinRoom(roomId);
            })
            .on('player_joined', msg => {
                renderLobby(msg.room.players);
                renderSidebar(msg.room.players);
                addLog(`${msg.player.name} entrou`);
            })
            .on('error', msg => toast(msg.message, 'error'))

            // ── Game starts ─────────────────────────────────────────────
            .on('game_started', msg => {
                showPhase(true);
                fullSequence = [];
                $seqRow.innerHTML = '';
                $seqLabel.textContent = '';
                renderSidebar(msg.room.players);
                addLog('Jogo iniciado!');
                toast('Jogo iniciado!', 'success');
            })

            // ── Round start: "round N — player X's turn" ────────────────
            .on('round_start', msg => {
                $round.textContent = msg.round;
                clearBigArrow();
                $inputSec.classList.remove('visible');
                myTurn = false;
                setArrowsEnabled(false);
                stopTimer();

                const isMe = msg.current_player_id === playerId;
                setTurnBanner(isMe, msg.current_player_name);
                $progressMsg.textContent = `Rodada ${msg.round} — sequência de ${msg.sequence_length} seta(s)`;
                addLog(`── Rodada ${msg.round}: vez de ${msg.current_player_name}`);
            })

            // ── Sequence display (one arrow at a time) ──────────────────
            .on('show_sequence_start', msg => {
                fullSequence = []; // will rebuild from show_arrow events
                $seqRow.innerHTML = '';
                $seqLabel.textContent = `0/${msg.length}`;
                if ($bigArrow.style.display === 'none') {
                    $bigArrow.style.display = 'flex';
                    $bigArrow.textContent = '…';
                    $bigArrow.className = 'arrow-display';
                }
                $progressMsg.textContent = 'Memorize a sequência!';
            })
            .on('show_arrow', msg => {
                fullSequence.push(msg.arrow);
                showBigArrow(msg.arrow);
                // Rebuild chips with current arrow highlighted
                buildSequenceRow(fullSequence, fullSequence.length - 1);
                addLog(`Seta ${msg.position}/${msg.total}: ${ARROW_MAP[msg.arrow]}`);
            })
            .on('clear_arrow', () => {
                // Remove highlight from all chips when arrow clears
                $seqRow.querySelectorAll('.arrow-chip').forEach(c => c.classList.remove('current'));
                $bigArrow.textContent = '';
                $bigArrow.className = 'arrow-display';
            })
            .on('show_sequence_end', () => {
                clearBigArrow();
                buildSequenceRow(fullSequence); // show all chips without highlight
                $progressMsg.textContent = 'Aguardando jogador responder...';
            })

            // ── It's THIS player's turn ──────────────────────────────────
            .on('your_turn', msg => {
                myTurn = true;
                moveIndex = 0;
                seqLength = msg.sequence_length;
                $inputSec.classList.add('visible');
                setArrowsEnabled(true);
                startTimer(msg.timeout_ms);
                $moveProg.textContent = `0/${seqLength}`;
                $turnStatus.textContent = 'Repita pressionando as setas na ordem certa!';
                buildSequenceRow(fullSequence, 0); // highlight first chip
                toast('SUA VEZ!', 'info');
            })

            // ── Another player's turn (spectating) ──────────────────────
            .on('waiting_for_player', msg => {
                $progressMsg.textContent = `Aguardando ${msg.player_name} responder...`;
            })

            // ── Move result for THIS player ──────────────────────────────
            .on('move_result', msg => {
                const idx = msg.move_index;
                if (msg.correct) {
                    markChip(idx, true);
                    moveIndex++;
                    $moveProg.textContent = `${moveIndex}/${seqLength}`;
                    buildSequenceRow(fullSequence, moveIndex < seqLength ? moveIndex : -1);
                    $turnStatus.textContent = `✅ ${moveIndex}/${seqLength} correto!`;
                    if (msg.remaining === 0) {
                        stopTimer();
                        setArrowsEnabled(false);
                        $inputSec.classList.remove('visible');
                    }
                } else {
                    markChip(idx, false);
                    stopTimer();
                    setArrowsEnabled(false);
                    myTurn = false;
                    $inputSec.classList.remove('visible');
                    $turnStatus.textContent = `❌ Errou na seta ${idx + 1}!`;
                    toast('❌ Errou!', 'error');
                }
            })
            .on('timeout', () => {
                myTurn = false;
                setArrowsEnabled(false);
                stopTimer();
                $inputSec.classList.remove('visible');
                toast('⏱ Tempo esgotado!', 'error');
            })

            // ── Round result ─────────────────────────────────────────────
            .on('move_correct', msg => {
                addLog(`✅ ${msg.player_name} acertou a rodada ${msg.round}`);
                toast(`${msg.player_name} acertou!`, 'success', 1500);
            })
            .on('player_eliminated', msg => {
                addLog(`💀 ${msg.player.name} foi eliminado (rodada ${msg.round})`);
                toast(`${msg.player.name} eliminado!`, 'error');
            })
            .on('round_result', msg => {
                const survivors = msg.survivors.reduce((acc, p) => ({ ...acc, [p.id]: p }), {});
                // Add eliminated player too
                const all = { ...survivors, [msg.player.id]: msg.player };
                renderSidebar(all);
                $progressMsg.textContent = msg.correct
                    ? `${msg.player.name} acertou! Próxima rodada em instantes...`
                    : `${msg.player.name} errou e foi eliminado. Próxima rodada...`;
            })

            // ── Game over ─────────────────────────────────────────────
            .on('game_over', msg => {
                stopTimer();
                const winner = msg.winner;
                const isWinner = winner && winner.id === playerId;
                document.getElementById('result-emoji').textContent = isWinner ? '🏆' : '🎮';
                document.getElementById('result-title').textContent = isWinner ? 'Você Venceu!' : 'Fim de Jogo!';
                document.getElementById('result-subtitle').textContent =
                    winner ? `Vencedor: ${winner.name} · ${msg.total_rounds} rodadas` : 'Empate!';
                const scoreEl = document.getElementById('result-scores');
                scoreEl.innerHTML = msg.scoreboard.map((p, i) => `
        <div class="score-row">
          <span>${['🥇', '🥈', '🥉'][i] || `${i + 1}.`} ${p.name}</span>
          <span style="font-weight:700;color:var(--accent)">${p.score} pts</span>
        </div>`).join('');
                document.getElementById('result-overlay').classList.add('show');
            })
            .on('player_disconnected', msg => {
                addLog(`⚠️ ${msg.player_name} desconectou`);
            })

            // Lamport display
            .on('*', (type, msg) => {
                if (msg && msg.lamport_ts !== undefined) {
                    $sdLamport.textContent = msg.lamport_ts;
                }
            });

        // ── Start button ──────────────────────────────────────────────
        $btnStart.addEventListener('click', () => client.startGame());

        // ── Connect ───────────────────────────────────────────────────
        client.connect(playerId, playerName);
    </script>
</body>

</html>
