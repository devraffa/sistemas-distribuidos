<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoryArrows — Placar Global</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <style>
        .scoreboard-page {
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        .score-table {
            width: 100%;
            max-width: 720px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .rank-col {
            width: 50px;
            font-weight: 700;
        }

        .rank-1 {
            color: #fbbf24;
            font-size: 1.2rem;
        }

        .rank-2 {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .rank-3 {
            color: #b45309;
            font-size: 1.1rem;
        }

        .pts-col {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.05rem;
        }

        .stat-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 720px;
        }

        .stat-card {
            flex: 1;
            min-width: 140px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 4px;
        }

        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--muted);
        }

        #empty {
            display: none;
            text-align: center;
            color: var(--muted);
            padding: 40px;
        }
    </style>
</head>

<body>
    <div class="scoreboard-page">

        <!-- Header -->
        <div style="text-align:center;">
            <div style="font-size:3rem;margin-bottom:8px;">🏆</div>
            <h1>Placar Global</h1>
            <p>Ranking dos melhores jogadores de todos os tempos</p>
        </div>

        <!-- Stats -->
        <div class="stat-row" id="stats-row">
            <div class="glass stat-card">
                <div class="stat-value" id="stat-players">—</div>
                <div class="stat-label">Jogadores</div>
            </div>
            <div class="glass stat-card">
                <div class="stat-value" id="stat-games">—</div>
                <div class="stat-label">Partidas</div>
            </div>
            <div class="glass stat-card">
                <div class="stat-value" id="stat-best">—</div>
                <div class="stat-label">Melhor Sequência</div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading">
            <div class="spinner"></div>
            <span>Carregando placar...</span>
        </div>

        <!-- Table -->
        <div class="glass score-table" id="score-table" style="display:none;">
            <div style="padding:20px 20px 0;">
                <h2>🥇 Top Jogadores</h2>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th class="rank-col">#</th>
                            <th>Jogador</th>
                            <th>Pontuação Total</th>
                            <th>Rodadas</th>
                            <th>Partidas</th>
                            <th>Melhor Run</th>
                        </tr>
                    </thead>
                    <tbody id="score-tbody"></tbody>
                </table>
            </div>
        </div>

        <div id="empty">
            <p>Nenhuma partida registrada ainda.<br>Seja o primeiro a jogar! 🎮</p>
        </div>

        <a href="/" class="btn btn-secondary">← Voltar ao Lobby</a>
    </div>

    <script>
        async function loadScoreboard() {
            try {
                const r = await fetch('/api/scoreboard');
                const data = await r.json();
                const scores = data.scoreboard || [];

                document.getElementById('loading').style.display = 'none';

                if (scores.length === 0) {
                    document.getElementById('empty').style.display = 'block';
                    return;
                }

                // Stats
                document.getElementById('stat-players').textContent = scores.length;
                document.getElementById('stat-games').textContent = Math.max(...scores.map(s => s.games_played));
                document.getElementById('stat-best').textContent = Math.max(...scores.map(s => s.best_run));

                // Table
                const rankEmoji = ['🥇', '🥈', '🥉'];
                const tbody = document.getElementById('score-tbody');
                tbody.innerHTML = scores.map((p, i) => `
          <tr>
            <td class="rank-col ${i < 3 ? `rank-${i + 1}` : ''}">${rankEmoji[i] || (i + 1)}</td>
            <td style="font-weight:600;">${p.player_name}</td>
            <td class="pts-col">${p.total_score.toLocaleString()}</td>
            <td>${p.total_rounds}</td>
            <td>${p.games_played}</td>
            <td><span class="badge badge-active">${p.best_run} setas</span></td>
          </tr>
        `).join('');

                document.getElementById('score-table').style.display = 'block';
            } catch (e) {
                document.getElementById('loading').innerHTML = `
          <p style="color:var(--down);">Erro ao carregar placar.<br>${e.message}</p>
        `;
            }
        }

        loadScoreboard();
    </script>
</body>

</html>
